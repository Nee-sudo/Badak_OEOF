# GitHub Actions workflow to build and deploy a TypeScript Node.js backend to Azure App Service
# Web App Name: one-earth
# Runtime Stack: NODE|22-lts

name: Build and Deploy OEOF Backend to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    name: Build TypeScript Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Compile TypeScript
        run: npm run build

      - name: Prepare Artifact Package
        # We need to package:
        # - dist/ (compiled output)
        # - package.json
        # - package-lock.json (if exists)
        # We exclude devDependencies during deployment to optimize bundle size and speed.
        run: |
          mkdir -p release
          cp -r dist release/
          cp package.json release/
          [ -f package-lock.json ] && cp package-lock.json release/ || true

      - name: Upload Artifact for Deployment Job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release/

  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-token.outputs.webapp-url || steps.deploy-publish-profile.outputs.webapp-url }}

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      # Scenario A: Modern Token Authentication using Service Principal credentials.
      # Bypasses "Forbidden from extensions API" error caused by disabled Web App Publishing Basic Auth (SCM).
      - name: Log in to Azure
        if: ${{ secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App (Token Auth)
        id: deploy-token
        if: ${{ secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'one-earth'
          package: .

      # Scenario B: Classic Publish Profile-based deployment.
      # Only runs if AZURE_CREDENTIALS secret is not defined, relying on SCM basic auth.
      - name: Deploy to Azure Web App (Publish Profile Auth)
        id: deploy-publish-profile
        if: ${{ secrets.AZURE_CREDENTIALS == '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'one-earth'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
