# GitHub Actions workflow to build and deploy a TypeScript Node.js backend to Azure App Service
# Web App Name: one-earth
# Runtime Stack: NODE|22-lts

name: Build and Deploy OEOF Backend to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    name: Build TypeScript Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Compile TypeScript
        run: npm run build

      - name: Prepare Artifact Package
        # We need to package:
        # - dist/ (compiled output)
        # - package.json
        # - package-lock.json (if exists)
        # - node_modules/ (production dependencies only)
        # This allows the app to start instantly on Azure without needing a separate Oryx build step on the server.
        run: |
          mkdir -p release
          cp -r dist release/
          cp package.json release/
          [ -f package-lock.json ] && cp package-lock.json release/ || true
          cd release
          npm install --omit=dev

      - name: Upload Artifact for Deployment Job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release/

  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'one-earth'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
